<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>EPL Scout - Dashboard</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<header class="main-header">
    <div class="header-inner">

        <!-- EPL 로고 + 타이틀 -->
        <div class="brand">
            <img src="/images/epl.png" class="epl-logo">
            <h1>EPL Scout</h1>
        </div>


        <div class="header-controls">
            <select id="seasonSelect" class="season-select">
                <option value="2025">2025</option>
                <option value="2024">2024</option>
                <option value="2023" selected>2023</option>
                <option value="2022">2022</option>
                <option value="2021">2021</option>
            </select>

            <nav>
                <a href="/dashboard.html">Dashboard</a>
                <a href="/teams.html">Team</a>
                <a href="/index.html">Scout</a>
            </nav>
        </div>

    </div>
</header>

<div class="dashboard-wrapper">

    <!-- LEFT PANEL -->
    <div class="left-panel">
        <div class="card">
            <div class="card-header">
                <h2>Premier League Table</h2>
                <span id="seasonTitle">2023 Season</span>
            </div>

            <table class="standings-table modern-table">
                <thead>
                <tr>
                    <th>Pos</th>
                    <th>Team</th>
                    <th>Pl</th>
                    <th>W</th>
                    <th>D</th>
                    <th>L</th>
                    <th>Pts</th>
                    <th>GD</th>
                </tr>
                </thead>
                <tbody id="leagueStandings">
                <tr>
                    <td colspan="8">Loading...</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- RIGHT PANEL -->
    <div class="right-panel">

        <!-- 최근 경기 -->
        <div class="card small-card">
            <h3>최근 경기</h3>
            <div id="recentMatches"></div>
        </div>

        <!-- 차트 -->
        <div class="card small-card">
            <h3>리그 데이터 시각화</h3>

            <p id="chartDesc" class="chart-desc">
                득점 기준 상위 팀 비교
            </p>

            <div class="chart-menu">
                <button class="chart-btn active" data-chart="goals">득점</button>
                <button class="chart-btn" data-chart="results">승/무/패</button>
                <button class="chart-btn" data-chart="goalDiff">득실차</button>
            </div>

            <canvas id="leagueChart" height="160"></canvas>
        </div>

        <!-- 뉴스 -->
        <div class="card small-card">
            <h3>리그 뉴스</h3>
            <div id="leagueNews"></div>
        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="/js/dashboard.js"></script>

</body>
</html>
