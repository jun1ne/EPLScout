<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>EPL Scout - 선수 영입 분석</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<header class="top-nav">
    <div class="nav-inner">
        <h1>EPL Scout</h1>
        <nav>
            <a href="/dashboard.html">대시보드</a>
            <a href="/teams.html">팀 관리</a>
            <a href="/index.html" class="active">스카우트 분석</a>
        </nav>
    </div>
</header>

<div class="main-wrapper">

    <!-- ================= 팀 선택 영역 ================= -->
    <div class="filter-bar">

        <div class="filter-group">
            <label>팀 선택</label>
            <select id="teamSelect"></select>
        </div>

        <div class="filter-group">
            <label>시즌</label>
            <input type="number" id="seasonInput" value="2023">
        </div>

        <button id="recommendBtn" class="btn-primary">
            영입 후보 분석
        </button>

    </div>

    <!-- ================= 팀 분석 카드 ================= -->
    <div class="analysis-card">

        <!-- 팀 로고 + 팀 이름 영역 -->
        <div class="team-header">
            <img id="teamLogoImg"
                 class="team-logo-large"
                 style="display:none;" />

            <div class="team-title-area">
                <h2 id="teamNameTitle">팀 분석 결과</h2>
                <span class="team-subtitle">
                    스쿼드 구성 및 전력 진단
                </span>
            </div>
        </div>

        <!-- 기존 분석 데이터 출력 영역 -->
        <div id="teamAnalysis"></div>

    </div>

    <!-- ================= 추천 리스트 ================= -->
    <div class="recommend-section">
        <h2>추천 영입 후보</h2>
        <div id="recommendList" class="recommend-grid"></div>
    </div>

</div>

<script src="/js/app.js"></script>
</body>
</html>
