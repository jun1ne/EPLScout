<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>EPL Scout - 팀 상세</title>
    <link rel="stylesheet" href="/css/style.css">

    <!-- Chart.js 추가 -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<header class="main-header">
    <div class="header-inner">
        <h1>팀 상세 정보</h1>
        <nav>
            <a href="/dashboard.html">대시보드</a>
            <a href="/teams.html">팀 목록</a>
        </nav>
    </div>
</header>

<div class="team-detail-wrapper">

    <!-- ===================== TEAM HERO ===================== -->
    <section class="team-hero">
        <div class="hero-left">

            <img id="teamLogo"
                 class="team-logo-img"
                 src=""
                 alt="팀 로고"
                 style="width:120px; height:120px; object-fit:contain;" />

            <div>
                <h1 id="teamName">로딩 중...</h1>

                <div class="season-select-wrapper">
                    <label for="seasonSelect">시즌:</label>
                    <select id="seasonSelect">
                        <option value="2021">2021</option>
                        <option value="2022">2022</option>
                        <option value="2023">2023</option>
                        <option value="2024">2024</option>
                        <option value="2025">2025</option>
                    </select>
                </div>

                <div id="teamSummary"></div>
            </div>

        </div>
    </section>

    <!-- ===================== STAT GRID ===================== -->
    <section class="team-stat-grid">
        <div class="team-stat-card">
            <h4>평균 연령</h4>
            <p id="avgAgeStat">-</p>
        </div>
        <div class="team-stat-card">
            <h4>평균 평점</h4>
            <p id="avgRatingStat">-</p>
        </div>
        <div class="team-stat-card">
            <h4>선수단 규모</h4>
            <p id="squadSizeStat">-</p>
        </div>
        <div class="team-stat-card">
            <h4>시즌</h4>
            <p id="seasonStat">-</p>
        </div>
    </section>

    <!-- ===================== MAIN GRID ===================== -->
    <div class="team-main-grid">

        <!-- 선수 목록 -->
        <div class="card">
            <h3>선수 명단</h3>
            <table class="modern-table upgraded-table">
                <thead>
                    <tr>
                        <th>번호</th>
                        <th>선수명</th>
                        <th>포지션</th>
                        <th>나이</th>
                        <th>국적</th>
                    </tr>
                </thead>
                <tbody id="playerTableBody">
                </tbody>
            </table>
        </div>

        <!-- 우측 패널 -->
        <div class="side-panel">

            <!-- ================= TEAM INSIGHTS ================= -->
            <div class="card small-card">
                <h3>전력 분석</h3>
                <div id="weakPositionsBox">-</div>
                <div id="positionCountBox"></div>
            </div>

            <!-- ================= PERFORMANCE ================= -->
            <div class="card small-card">
                <h3>포지션별 평균 평점</h3>
                <canvas id="positionChart" height="200"></canvas>
            </div>

        </div>

    </div>

</div>

<script src="/js/team.js"></script>
</body>
</html>
